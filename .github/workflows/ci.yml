name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: payme
          POSTGRES_PASSWORD: payme_secret
          POSTGRES_DB: payme_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U payme -d payme_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Apply database migrations
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: payme
          DB_PASSWORD: payme_secret
          DB_NAME: payme_db
        run: npm run migrate

      - name: Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: payme-ci-secret
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: payme
          DB_PASSWORD: payme_secret
          DB_NAME: payme_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: npm test
